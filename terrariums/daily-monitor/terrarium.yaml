terrarium:
  name: daily-monitor

  root:
    name: root
    base_config: ../../creatures/lab-runner/
    no_inherit: [tools]
    system_prompt_file: prompts/root.md
    tools:
      - think
      - stop_task

  creatures:
    - name: data
      base_config: ../../creatures/lab-runner/
      system_prompt_file: prompts/data.md
      output_wiring:
        - to: regime
          prompt: "{content}"
        - to: root
          with_content: false
          prompt: "status_ping: data completed; full packet routed directly to regime."

    - name: regime
      base_config: ../../creatures/lab-runner/
      no_inherit: [tools]
      system_prompt_file: prompts/regime.md
      tools:
        - think
        - stop_task
      output_wiring:
        - to: screen
          prompt: "{content}"
        - to: root
          with_content: false
          prompt: "status_ping: regime completed; packet routed directly to screen."

    - name: screen
      base_config: ../../creatures/lab-runner/
      no_inherit: [tools]
      system_prompt_file: prompts/screen.md
      tools:
        - think
        - stop_task
      output_wiring:
        - to: risk
          prompt: "{content}"
        - to: root
          with_content: false
          prompt: "status_ping: screen completed; packet routed directly to risk."

    - name: risk
      base_config: ../../creatures/lab-runner/
      no_inherit: [tools]
      system_prompt_file: prompts/risk.md
      tools:
        - think
        - stop_task
      output_wiring:
        - to: recommendation
          prompt: "{content}"
        - to: root
          with_content: false
          prompt: "status_ping: risk completed; packet routed directly to recommendation."

    - name: recommendation
      base_config: ../../creatures/lab-runner/
      no_inherit: [tools]
      system_prompt_file: prompts/recommendation.md
      tools:
        - think
        - stop_task
      output_wiring:
        - to: critic
          prompt: "{content}"
        - to: root
          with_content: false
          prompt: "status_ping: recommendation completed; packet routed directly to critic."

    - name: critic
      base_config: ../../creatures/strategy-critic/
      system_prompt_file: prompts/critic.md
      output_wiring:
        - to: root

  channels:
    tasks: { type: queue }
